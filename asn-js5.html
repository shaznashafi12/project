<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade</title>
</head>
<body>
    <script>
        let mark=parseFloat(prompt("enter the total mark:"));
        if(mark>=90){
            document.write("A");
        }
        else if(mark>=80){
            document.write("B");
        }
        else if(mark>=70){
            document.write("C");
        }
        else if(mark>=60){
            document.write("D");
        }
        else if(mark>=50){
            document.write("E");
        }
        else{
            document.write("Failed");
        }
    </script>
</body>
</html>
