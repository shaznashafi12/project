<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array descending</title>
</head>
<body>
    <script>
        let size=prompt("enter the size of an array:");
        alert("enter the values of array:")
        let arr=[];
        for(let i=0;i<size;i++){
            arr[i]=parseInt(prompt("enter the numbers:"));
        }
        for(let i=0;i<size-1;i++){
            for(let j=0;j<size-i-1;j++){
                if(arr[j]<arr[j+1]){
                let temp=arr[j];
                arr[j]=arr[j+1];
                arr[j+1]=temp;
                }
            }
        }
        document.write("sorted array:" + arr);
    </script>
</body>
</html>
