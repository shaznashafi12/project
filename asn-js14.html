<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D arrays</title>
</head>
<body>
    <script>
        let size=parseInt(prompt("enter the size of arrays:"));
        let arr1=[];
        alert("enter the values of array1:");
        for(let i=0;i<size;i++){
            arr1[i]=[];
            for(let j=0;j<size;j++){
                arr1[i][j]=parseInt(prompt("enter the array elements:"));
            }
        }

        let arr2=[];
        alert("enter the values of array2:");
        for(let i=0;i<size;i++){
            arr2[i]=[];
            for(let j=0;j<size;j++){
                arr2[i][j]=parseInt(prompt("enter the array elements:"));
            }
        }
        
        let sum=[];
        for(let i=0;i<size;i++){
            sum[i]=[];
            for(let j=0;j<size;j++){
                sum[i][j]=arr1[i][j] + arr2[i][j];
            }
        }

        document.write("sum of 2 arrays is:<br><br>");
        for(let i=0;i<size;i++){
            document.write(sum[i].join(" ")+ "<br>");
        }

    </script>
</body>
</html>
