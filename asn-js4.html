<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>std-result</title>
</head>
<body>
    <script>
        let mark=parseFloat(prompt("enter the mark:"));
        if(mark<=100 && mark>=50){
            document.write("Passed");
        }
        else{
            document.write("Failed");
        }
    </script>
</body>
</html>
